{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-sap-primary text-white text-center py-3">
                <h4 class="mb-0">Login to HANA Auth Service Portal</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted">Username</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    {% if form.errors %}
                        <div class="alert alert-danger py-2 small">Invalid username or password.</div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100 py-2 font-bold">Login</button>
                </form>
            </div>
        </div>
        <p class="text-center mt-3 text-muted small">Use your corporate credentials.</p>
    </div>
</div>
{% endblock %}
